site_name: MAO Research Group
site_description: Machine learning, simulation-based design optimization, and dimensionality reduction for engineering design
site_url: https://cnr-inm-mao.github.io/
use_directory_urls: true

theme:
  name: material
  language: en
  custom_dir: overrides

  logo: assets/logos/logo-icon.png
  favicon: assets/logos/logo-icon.png

  features:
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: blue grey
      accent: teal

nav:
  - Home: index.md
  - People: people.md
  - Research: research.md
  - Projects:
    - Overview: projects/index.md
    - BIODRONES: projects/biodrones.md
  - Software:
    - Overview: software/index.md
    - PME-toolkit: software/pme-toolkit.md
  - Publications:
      - Overview: publications/index.md
      - Journal Articles: publications/journal.md
      - Conference Proceedings: publications/conference.md
      - Books & Chapters: publications/books.md
  - Datasets:
      - Overview: datasets/index.md
      - Dimensionality Reduction:
          - Overview: datasets/dr.md
          - Bio-inspired AUV: datasets/dr_glider.md
          - RAE2822 Airfoil: datasets/dr_rae2822.md
          - DTMB 5415 Hull: datasets/dr_5415.md
      - Time Series:
          - Overview: datasets/ts.md
          - CK14-e ASV: datasets/ts_ck14.md
  - Opportunities: opportunities.md
  - Contact: contact.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - assets/css/extra.css

extra_javascript:
  - assets/js/publications.js

