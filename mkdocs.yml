site_name: MAO Research Group
site_description: Machine learning, simulation-based design optimization, and dimensionality reduction for engineering design
site_url: https://cnr-inm-mao.github.io/
use_directory_urls: true

theme:
  name: material
  language: en

  logo: assets/logos/logo-icon.png
  favicon: assets/logos/logo-icon.png

  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: blue grey
      accent: teal

nav:
  - Home: index.md
  - People: people.md
  - Research: research.md
  - Projects: projects.md
  - Software: software.md
  - Publications: publications.md
  - Datasets: datasets.md
  - Opportunities: opportunities.md
  - Contact: contact.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - assets/css/extra.css
